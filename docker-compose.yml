version: "3"
services:
  db:
    container_name: postgresql
    image: postgres:16
    command: -db-ssl-mode=allow
    ports:
      - "5432:5432"
    volumes:
      - ./src/postgres_data/:/var/lib/postgresql/data
      - ./src/postgres-custom-config:/etc/postgresql
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U default_user -d api_database" ]
      interval: 5s
      timeout: 5s
      retries: 5
  web:
    container_name: api
    build:
      context: ./src
      dockerfile: Dockerfile.web
    ports:
      - 80:80
    environment:
      - POSTGRES_CONN=postgres://default_user:qwerty123!@db:5432/api_database
      - POSTGRES_JDBC_URL=jdbc:postgresql://{localhost}:{5432}/{api_database}
      - POSTGRES_DATABASE=api_database
      - POSTGRES_USERNAME=default_user
      - POSTGRES_PASSWORD=qwerty123!
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - SECRET_KEY=PASTE_YOUR_SECRET_THERE
    command: ./application
    depends_on:
      db:
        condition: service_healthy